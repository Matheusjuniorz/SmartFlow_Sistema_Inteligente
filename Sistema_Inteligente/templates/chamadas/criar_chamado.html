<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Chamado - SmartFlow</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; border-bottom: 2px solid #ffc107; padding-bottom: 10px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-ready { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .btn-ready:hover { background: #218838; }
    </style>
</head>
<body>

<div class="card">
    <h2>➕ Abrir Novo Chamado</h2>
    
    <form method="POST" action="{% url 'criar_chamado' %}">
        {% csrf_token %}

        <div class="field">
            <label>Cliente:</label>
            <select name="cliente" required>
                <option value="">-- Selecione o Cliente --</option>
                {% for cliente in clientes %}
                    <option value="{{ cliente.id }}">{{ cliente.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="field">
            <label>Título / Assunto Curto:</label>
            <input type="text" name="titulo" placeholder="Ex: Reparo de Impressora" required>
        </div>

        <div class="field">
            <label>Descrição do Problema:</label>
            <textarea name="descricao" rows="5" placeholder="Detalhe o defeito aqui..." required></textarea>
        </div>

        <div class="field">
            <label>Prioridade:</label>
            <select name="prioridade">
                <option value="baixa">Baixa</option>
                <option value="media" selected>Média</option>
                <option value="alta">Alta</option>
            </select>
        </div>

        <button type="submit" class="btn-ready">REGISTRAR CHAMADO AGORA</button>
        
        <div style="text-align: center; margin-top: 15px;">
            <a href="{% url 'lista_chamados' %}" style="color: #666; text-decoration: none;">Voltar para a lista</a>
        </div>
    </form>
</div>

</body>
</html>
