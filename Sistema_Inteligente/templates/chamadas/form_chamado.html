{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-[#1a1d21] flex justify-center items-center p-6">
    <div class="bg-[#24292e] w-full max-w-lg rounded-2xl shadow-2xl border border-gray-800 p-8 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-red-600"></div>

        <div class="mb-8">
            <h2 class="text-2xl font-black text-white flex items-center gap-3">
                <span class="text-red-600">⚡</span>
                Abrir Novo Chamado
            </h2>
            <p class="text-gray-500 text-[10px] uppercase font-black tracking-[0.2em] mt-2">Configuração de Ordem de Serviço</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="bg-red-900/20 border-l-4 border-red-600 p-4 rounded-lg mb-6 text-red-400 text-sm italic">
                    <strong>⚠️ Erro ao salvar:</strong> Verifique os dados abaixo.
                </div>
            {% endif %}

            <div class="django-form-style text-gray-400">
                {{ form.as_p }}
            </div>
            
            <div class="flex items-center gap-4 pt-6">
                <button type="submit" class="flex-[2] bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg shadow-red-900/40 transition-all transform active:scale-95 uppercase tracking-widest text-sm">
                    Salvar Chamado
                </button>
                <a href="{% url 'lista_chamados' %}" class="flex-1 text-center text-gray-500 hover:text-white font-bold text-xs uppercase tracking-widest transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    /* Estiliza o parágrafo que o Django cria */
    .django-form-style p {
        margin-bottom: 1.25rem;
    }
    /* Estiliza os Labels */
    .django-form-style label {
        display: block;
        font-size: 0.75rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.5rem;
        color: #9ca3af; /* gray-400 */
    }
    /* Estiliza Inputs, Selects e Textareas */
    .django-form-style input, 
    .django-form-style select, 
    .django-form-style textarea {
        width: 100%;
        background-color: #1a1d21;
        border: 1px solid #374151;
        color: white;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        outline: none;
        transition: all 0.2s;
    }
    /* Efeito de foco vermelho igual à imagem */
    .django-form-style input:focus, 
    .django-form-style select:focus, 
    .django-form-style textarea:focus {
        border-color: #dc2626; /* red-600 */
        box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.2);
    }
</style>
{% endblock %}
