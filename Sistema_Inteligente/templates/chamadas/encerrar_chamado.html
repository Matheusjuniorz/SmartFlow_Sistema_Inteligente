{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-family: sans-serif;">
    <h2 style="color: #333; border-bottom: 2px solid #28a745; padding-bottom: 10px;">✅ Finalizar Chamado #{{ chamado.id }}</h2>
    
    <div style="margin: 20px 0; color: #666;">
        <p><strong>Cliente:</strong> {{ chamado.cliente.nome }}</p>
        <p><strong>Descrição original:</strong> {{ chamado.descricao }}</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <label style="font-weight: bold; display: block; margin-bottom: 10px;">Solução Técnica aplicada:</label>
        <textarea name="solucao" rows="6" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;" placeholder="Descreva detalhadamente o que foi feito..." required></textarea>
        
        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <button type="submit" style="background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; flex: 1;">
                Gravar e Encerrar
            </button>
            <a href="{% url 'dashboard' %}" style="text-decoration: none; background: #6c757d; color: white; padding: 12px 25px; border-radius: 5px; font-weight: bold; text-align: center; flex: 1;">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
