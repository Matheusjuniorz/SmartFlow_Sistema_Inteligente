{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-[#1a1d21] flex justify-center items-center p-6">
    <div class="bg-[#24292e] w-full max-w-xl rounded-2xl shadow-2xl border border-gray-800 p-8 relative overflow-hidden">
        
        <div class="absolute top-0 right-0 w-32 h-32 bg-red-600/5 rounded-full blur-3xl"></div>

        <div class="mb-10 relative">
            <h2 class="text-2xl font-black text-white flex items-center gap-3">
                <span class="text-red-600">👤</span>
                Cadastro de Cliente
            </h2>
            <p class="text-gray-500 text-[10px] uppercase font-bold tracking-[0.2em] mt-2">Expansão da Base de Dados</p>
            <div class="h-1 w-12 bg-red-600 mt-4 rounded-full"></div>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="bg-red-900/10 border border-red-600/20 p-4 rounded-xl mb-6">
                    <p class="text-red-500 text-xs font-bold italic">⚠️ Erro: Revise os dados do cliente.</p>
                </div>
            {% endif %}

            <div class="django-form-style">
                {{ form.as_p }}
            </div>
            
            <div class="flex flex-col md:flex-row gap-4 pt-6">
                <button type="submit" 
                    class="flex-[2] bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-lg shadow-red-900/30 transition-all transform active:scale-95 uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                    <span>💾</span> Salvar Cliente
                </button>
                
                <a href="{% url 'lista_clientes' %}" 
                    class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white font-bold py-4 rounded-xl text-center transition-all uppercase tracking-widest text-[10px] flex items-center justify-center">
                    Voltar
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    .django-form-style p {
        margin-bottom: 1.5rem;
    }
    .django-form-style label {
        display: block;
        font-size: 0.7rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.6rem;
        color: #9ca3af; /* gray-400 */
    }
    .django-form-style input, 
    .django-form-style select, 
    .django-form-style textarea {
        width: 100%;
        background-color: #1a1d21;
        border: 1px solid #374151;
        color: white;
        padding: 0.85rem 1rem;
        border-radius: 0.85rem;
        outline: none;
        transition: all 0.2s;
        font-size: 0.95rem;
    }
    .django-form-style input:focus {
        border-color: #dc2626; /* red-600 */
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
        background-color: #1f2227;
    }
    /* Estilo para erros específicos em campos */
    .django-form-style .errorlist {
        color: #ef4444;
        font-size: 0.7rem;
        font-weight: bold;
        list-style: none;
        padding: 0;
        margin-top: 5px;
    }
</style>
{% endblock %}
