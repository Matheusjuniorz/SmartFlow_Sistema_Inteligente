<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFlow - Sistema Inteligente</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f7f6; }
        nav { background: #343a40; padding: 15px; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav a { color: white; text-decoration: none; margin-right: 15px; transition: 0.3s; }
        nav a:hover { color: #ffc107; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .two-factor-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 50px auto; }
    </style>
</head>
<body>

    <nav>
        <a href="/dashboard/" style="font-weight: bold; color: #ffc107;">📊 Dashboard</a>        
        <a href="{% url 'lista_chamados' %}">📋 Ver Chamados</a> |
        <a href="{% url 'criar_chamado' %}">➕ Novo Chamado</a>
    </nav>

    <div class="container">
        {% block content %}
        <div class="two-factor-container">
            <h2>Segurança do Responsável</h2>
            <hr>
            {% block two_factor_content %}
            {% endblock %}
        </div>
        {% endblock %}
    </div>

</body>
</html>
